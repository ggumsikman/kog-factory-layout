<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코그 인터내셔널 - 공장 기계 배치도</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── 헤더 ── -->
<div class="header">
  <div>
    <h1>⚙ 코그 인터내셔널 (Cog International) — 공장 기계 배치도</h1>
    <div class="sub">가동(전조실) · 나동(단조/헤더실) · 다동(포장실) · 2층(사무동) | Ctrl+S 저장 · Del 삭제 · Esc 선택해제 · 방향키 이동</div>
  </div>
  <div class="hbtns">
    <button onclick="addZone()">+ 구역</button>
    <button onclick="clearSelected()">선택해제</button>
    <button onclick="loadPreset()" class="gbtn">📐 DWG 기반 초기배치</button>
    <button onclick="saveLayout()" class="sbtn">💾 저장 (Ctrl+S)</button>
    <button onclick="loadLayout()">📂 불러오기</button>
    <button onclick="exportJSON()">내보내기</button>
    <button onclick="importJSON()">가져오기</button>
    <button onclick="window.print()">🖨 인쇄</button>
  </div>
</div>

<!-- ── 탭 ── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab(0)">🏭 가동 — 전조실 (WR·RL)</button>
  <button class="tab"        onclick="switchTab(1)">⚒ 나동 — 단조·헤더실 (HD)</button>
  <button class="tab"        onclick="switchTab(2)">📦 다동 — 포장실 (ASS'Y)</button>
  <button class="tab"        onclick="switchTab(3)">🏢 2층 — 사무동</button>
</div>

<!-- ── 메인 ── -->
<div class="main">

  <!-- 사이드바: machines.js에서 자동 생성 -->
  <div class="sidebar" id="sidebar"></div>

  <!-- 캔버스 -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas" id="canvas" style="width:2000px;height:1100px;">
      <div class="canvas-title" id="canvasTitle">가동 — 전조실</div>
    </div>
  </div>

  <!-- 속성 패널 -->
  <div class="props">
    <h3>속성 패널</h3>
    <div id="propsContent">
      <div class="nosel">기계를 클릭하면<br>속성이 표시됩니다<br><br>💡 드래그로 배치<br>모서리로 크기조절</div>
    </div>
    <hr class="phr">
    <div style="font-size:10px;color:#888;margin-bottom:5px;">캔버스 설정</div>
    <div class="pg">
      <label>너비 (px)</label>
      <input type="number" id="cvW" value="2000" min="800" step="100" onchange="resizeCv()">
    </div>
    <div class="pg">
      <label>높이 (px)</label>
      <input type="number" id="cvH" value="1100" min="400" step="100" onchange="resizeCv()">
    </div>
    <div class="pg">
      <label>축척 메모</label>
      <input type="text" id="scaleNote" value="격자 40px = 1m" placeholder="예: 1칸=1m">
    </div>
  </div>

</div>

<!-- ── 상태바 ── -->
<div class="statusbar">
  <span id="sb-tab">가동 전조실</span>
  <span id="sb-cnt">기계: 0개</span>
  <span id="sb-pos">마우스: -</span>
  <span id="sb-saved">미저장</span>
  <span style="margin-left:auto">코그 인터내셔널 배치도 편집기 v2.0 | 기계 선택 후 Delete로 삭제</span>
</div>

<!-- ── 스크립트 (순서 중요) ── -->
<script src="js/machines.js"></script>
<script src="js/preset.js"></script>
<script src="js/app.js"></script>

</body>
</html>
